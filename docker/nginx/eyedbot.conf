# EyedBot — reverse proxy (OMV / nginx del host)
# Copiar a: /etc/nginx/sites-available/eyedbot.conf
# Enlace:   ln -sf /etc/nginx/sites-available/eyedbot.conf /etc/nginx/sites-enabled/eyedbot.conf
#
# Requisitos en Portainer (.env del stack):
#   WEB_BIND_HOST=127.0.0.1
#   WEB_PORT=3000
#   WEB_PUBLIC_ORIGIN=https://eyedcomun.me
#   REDIRECT_URI=https://eyedcomun.me/callback
#   SESSION_COOKIE_SECURE=true
#
# Certbot: certbot --nginx -d eyedcomun.me -d www.eyedcomun.me

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name eyedcomun.me www.eyedcomun.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name eyedcomun.me www.eyedcomun.me;

    ssl_certificate     /etc/letsencrypt/live/eyedcomun.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eyedcomun.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    access_log /var/log/nginx/eyedbot.access.log;
    error_log  /var/log/nginx/eyedbot.error.log;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
        proxy_buffering       off;
    }
}
