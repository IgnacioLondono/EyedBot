server:
  port: 2333
  address: 0.0.0.0

lavalink:
  # Lavalink 4: sin "repository" (Maven releases por defecto).
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      snapshot: false
  server:
    # Sobrescribible con LAVALINK_SERVER_PASSWORD en Docker (variable oficial Lavalink 4).
    password: "youshallnotpass"
    sources:
      # Obligatorio: el YouTube integrado de Lavaplayer está roto; solo usar el plugin.
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      rotation: true
      distortion: true
      channelMix: true
      lowPass: true
      pluginFilters: true
    youtubePlaylistLoadLimit: 20
    playerUpdateInterval: 2
    bufferDurationMs: 800
    frameBufferDurationMs: 10000
    opusEncodingQuality: 10
    resamplingQuality: HIGH
    trackStuckThresholdMs: 15000
    useSeekGhosting: true
    gc-warnings: true

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    # Orden: clientes con Opus nativo primero; sin IOS (transcodifica y suena mal).
    # Sin ANDROID_MUSIC (suele fallar con "requires login").
    clients:
      - ANDROID_VR
      - TVHTML5_SIMPLY
      - MWEB
      - WEBEMBEDDED
      - MUSIC
    clientOptions:
      MUSIC:
        playback: false
        videoLoading: false
        playlistLoading: false
        searching: true
      WEBEMBEDDED:
        playlistLoading: false
        searching: false

metrics:
  prometheus:
    enabled: false

sentry:
  dsn: ""

logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO
    dev.lavalink.youtube: INFO
