server:
  port: 2333

lavalink:
  server:
    password: ${LAVALINK_PASSWORD:youshallnotpass}
    sources:
      youtube: true
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      rotation: true
      distortion: true
      channelMix: true
      lowPass: true
      pluginFilters: true
    youtubePlaylistLoadLimit: 20
    playerUpdateInterval: 2
    bufferDurationMs: 600
    frameBufferDurationMs: 8000
    opusEncodingQuality: 10
    resamplingQuality: HIGH
    trackStuckThresholdMs: 15000
    useSeekGhosting: true
    gc-warnings: true

metrics:
  prometheus:
    enabled: false

sentry:
  dsn: ""

logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO
