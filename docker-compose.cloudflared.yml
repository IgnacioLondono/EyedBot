# Cloudflare Tunnel para EyedBot (OMV / Portainer)
# Compose path: docker-compose.cloudflared.yml
#
# En Environment variables del stack:
#   CLOUDFLARE_TUNNEL_TOKEN=...   (Zero Trust → Tunnels → tu túnel → token)
#
# En Cloudflare → Public Hostname del túnel:
#   Type: HTTP
#   URL:  http://127.0.0.1:3000
#
# En el stack de EyedBot (host mode):
#   WEB_BIND_HOST=127.0.0.1
#   WEB_PORT=3000
#   WEB_PUBLIC_ORIGIN=https://tu-subdominio.tudominio.com
#   REDIRECT_URI=https://tu-subdominio.tudominio.com/callback
#   SESSION_COOKIE_SECURE=true

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    network_mode: host
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
