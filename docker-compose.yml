services:
  mysql:
    image: mysql:8.4
    container_name: eyedbot-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-tulabot}
      MYSQL_USER: ${DB_USER:-tulabot}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ${MYSQL_DATA_PATH:-/srv/dev-disk-by-uuid-a5b4e34c-5e9b-430c-93ad-0473fe6143d2/data/Etc/Eyedbot/mysql}:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - eyedbot-net

  # Solo se levanta con: docker compose --profile music up -d
  lavalink:
    profiles: ["music"]
    build:
      context: ./docker/lavalink
      dockerfile: Dockerfile
    image: eyedbot-lavalink:4
    container_name: eyedbot-lavalink
    restart: unless-stopped
    environment:
      - LAVALINK_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}
      - LAVALINK_SERVER_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}
      - LAVALINK_SERVER_SOURCES_YOUTUBE=false
      - LAVALINK_PLUGINS_0_DEPENDENCY=dev.lavalink.youtube:youtube-plugin:1.18.1
      - LAVALINK_PLUGINS_0_SNAPSHOT=false
      - PLUGINS_YOUTUBE_ENABLED=true
      - PLUGINS_YOUTUBE_ALLOW_SEARCH=true
      - PLUGINS_YOUTUBE_ALLOW_DIRECT_VIDEO_IDS=true
      - PLUGINS_YOUTUBE_ALLOW_DIRECT_PLAYLIST_IDS=true
      - PLUGINS_YOUTUBE_CLIENTS_0=MUSIC
      - PLUGINS_YOUTUBE_CLIENTS_1=TVHTML5_SIMPLY
      - PLUGINS_YOUTUBE_CLIENTS_2=ANDROID_VR
      - PLUGINS_YOUTUBE_CLIENTS_3=ANDROID_MUSIC
      - PLUGINS_YOUTUBE_CLIENTS_4=IOS
      - PLUGINS_YOUTUBE_CLIENTS_5=WEBEMBEDDED
      - SERVER_PORT=2333
      - _JAVA_OPTIONS=-Xmx512m
    ports:
      - "127.0.0.1:2333:2333"
    healthcheck:
      # $$ → $ dentro del contenedor; usa LAVALINK_PASSWORD del servicio lavalink
      test: ["CMD-SHELL", "curl -sf -H \"Authorization: $$LAVALINK_SERVER_PASSWORD\" http://127.0.0.1:2333/version -o /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    networks:
      - eyedbot-net

  # Bot de Discord
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: 20-alpine
    container_name: eyedbot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - WEB_PORT=${WEB_PORT:-3000}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - GUILD_ID=${GUILD_ID}
      - REDIRECT_URI=${REDIRECT_URI:-http://localhost:3000/callback}
      - SESSION_SECRET=${SESSION_SECRET}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-}
      - WEB_OWNER_DISCORD_ID=${WEB_OWNER_DISCORD_ID}
      - ALLOW_INSECURE_LOCAL_ORIGIN=${ALLOW_INSECURE_LOCAL_ORIGIN:-false}
      - WEB_ALLOWED_ORIGINS=${WEB_ALLOWED_ORIGINS:-}
      - MUSIC_ENABLED=${MUSIC_ENABLED:-false}
      - LAVALINK_ENABLED=${LAVALINK_ENABLED:-false}
      - LAVALINK_HOST=${LAVALINK_HOST:-lavalink}
      - LAVALINK_PORT=${LAVALINK_PORT:-2333}
      - LAVALINK_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}
      - LAVALINK_HTTP_WARMUP_MS=${LAVALINK_HTTP_WARMUP_MS:-180000}
      - CONFIG_CACHE_TTL_MS=${CONFIG_CACHE_TTL_MS:-120000}
      - SLOW_COMMAND_WARN_MS=${SLOW_COMMAND_WARN_MS:-900}
      - WELCOME_CARD_STYLE_ENABLED=${WELCOME_CARD_STYLE_ENABLED:-true}
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-tulabot}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-tulabot}
      - TENOR_API_KEY=${TENOR_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - EYEDBOT_API_KEY=${EYEDBOT_API_KEY:-}
      - PRESENCE_GUILD_IDS=${PRESENCE_GUILD_IDS:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
    ports:
      - "${WEB_BIND_IP:-127.0.0.1}:3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - eyedbot-net

networks:
  eyedbot-net:
    driver: bridge
