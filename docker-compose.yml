services:
  mysql:
    image: mysql:8.4
    container_name: eyedbot-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_change_me}
      MYSQL_DATABASE: ${DB_NAME:-tulabot}
      MYSQL_USER: ${DB_USER:-tulabot}
      MYSQL_PASSWORD: ${DB_PASSWORD:-tulabot_password}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - eyedbot-net

  # Solo se levanta con: docker compose --profile music up -d
  lavalink:
    profiles: ["music"]
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: eyedbot-lavalink
    restart: unless-stopped
    environment:
      - LAVALINK_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}
      - SERVER_PORT=2333
      - _JAVA_OPTIONS=-Xmx512m
    ports:
      - "2333:2333"
    volumes:
      - ./docker/lavalink/application.yml:/opt/Lavalink/application.yml:ro
    healthcheck:
      # $$ → $ dentro del contenedor; usa LAVALINK_PASSWORD del servicio lavalink
      test: ["CMD-SHELL", "curl -sf -H \"Authorization: $$LAVALINK_PASSWORD\" http://127.0.0.1:2333/version -o /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    networks:
      - eyedbot-net

  # Bot de Discord
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eyedbot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - WEB_PORT=${WEB_PORT:-3000}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID:-1451017355046948976}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - GUILD_ID=${GUILD_ID}
      - REDIRECT_URI=${REDIRECT_URI:-http://localhost:3000/callback}
      - SESSION_SECRET=${SESSION_SECRET:-change_this_session_secret}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - MUSIC_ENABLED=${MUSIC_ENABLED:-false}
      - LAVALINK_ENABLED=${LAVALINK_ENABLED:-false}
      - CONFIG_CACHE_TTL_MS=${CONFIG_CACHE_TTL_MS:-120000}
      - SLOW_COMMAND_WARN_MS=${SLOW_COMMAND_WARN_MS:-900}
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-tulabot}
      - DB_PASSWORD=${DB_PASSWORD:-tulabot_password}
      - DB_NAME=${DB_NAME:-tulabot}
      - TENOR_API_KEY=${TENOR_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - eyedbot-net

networks:
  eyedbot-net:
    driver: bridge

volumes:
  mysql-data:
