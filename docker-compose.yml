services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: eyedbot-lavalink
    restart: unless-stopped
    environment:
      - LAVALINK_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}
      - SERVER_PORT=2333
      - _JAVA_OPTIONS=-Xmx512m
    ports:
      - "2333:2333"
    volumes:
      - ./docker/lavalink/application.yml:/opt/Lavalink/application.yml:ro
    networks:
      - eyedbot-net

  # Bot de Discord
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eyedbot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - WEB_PORT=${WEB_PORT:-3000}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID:-1451017355046948976}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - GUILD_ID=${GUILD_ID}
      - REDIRECT_URI=${REDIRECT_URI:-http://localhost:3000/callback}
      - SESSION_SECRET=${SESSION_SECRET:-change_this_session_secret}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - LAVALINK_ENABLED=${LAVALINK_ENABLED:-false}
      - LAVALINK_HOST=${LAVALINK_HOST:-lavalink}
      - LAVALINK_PORT=${LAVALINK_PORT:-2333}
      - LAVALINK_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}
      - MUSIC_DEFAULT_VOLUME=${MUSIC_DEFAULT_VOLUME:-40}
      - MUSIC_MAX_VOLUME=${MUSIC_MAX_VOLUME:-65}
      - MUSIC_SKIP_FFMPEG=${MUSIC_SKIP_FFMPEG:-true}
      - MUSIC_CLEAN_PROFILE_ENABLED=${MUSIC_CLEAN_PROFILE_ENABLED:-false}
      - MUSIC_CLEAN_FILTERS=${MUSIC_CLEAN_FILTERS:-normalizer}
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-tulabot}
      - DB_PASSWORD=${DB_PASSWORD:-tulabot_password}
      - DB_NAME=${DB_NAME:-tulabot}
      - TENOR_API_KEY=${TENOR_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "3000:3000"
    depends_on:
      - lavalink
    networks:
      - eyedbot-net

networks:
  eyedbot-net:
    driver: bridge
