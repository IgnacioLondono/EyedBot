<section id="logsSection" class="section" data-owner-only="true">
            <div class="container">
                <div class="section-header section-header--split">
                    <div class="section-heading">
                        <h2 class="section-title"><svg class="section-title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6"></path><path d="M8 13h8"></path><path d="M8 17h8"></path></svg>Logs del Bot <span class="owner-pill owner-pill--title">Owner only</span></h2>
                        <div class="title-accent"></div>
                        <div class="section-subtools">
                            <select id="logLevelFilter" class="form-control log-filter">
                                <option value="">Todos los niveles</option>
                                <option value="info">Info</option>
                                <option value="warn">Warning</option>
                                <option value="error">Error</option>
                            </select>
                        </div>
                    </div>
                    <div class="section-tools">
                        <button type="button" id="backToServerFromLogs" class="btn btn-secondary back-to-server-btn" style="display:none;" title="Volver" aria-label="Volver">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <path d="M15 18l-6-6 6-6"></path>
                            </svg>
                            <span>Volver</span>
                        </button>
                        <button id="clearLogsBtn" class="btn btn-secondary">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                            <span>Limpiar</span>
                        </button>
                        <button id="autoScrollBtn" class="btn btn-secondary">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                            <span id="autoScrollText">Auto-scroll: ON</span>
                        </button>
                    </div>
                </div>
                <div id="logsContainer" class="logs-container"></div>
            </div>
        </section>
