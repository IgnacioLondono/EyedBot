<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EyedBot Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --saber-blue-dark: #9f5424;
            --saber-blue: #d98a54;
            --saber-blue-light: #ffb36f;
            --saber-gold: #ffd59b;
            --saber-gold-light: #ffe8c8;
            --bg-primary: #0d0806;
            --bg-secondary: #1b120f;
            --bg-card: rgba(33, 24, 20, 0.9);
            --text-primary: #fff4ec;
            --text-secondary: #d8c2b4;
            --text-muted: #ad9182;
            --border-color: rgba(255, 188, 138, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background:
                radial-gradient(circle at 18% 12%, rgba(255, 177, 111, 0.12), transparent 28%),
                radial-gradient(circle at 80% 18%, rgba(255, 120, 86, 0.10), transparent 24%),
                radial-gradient(circle at 65% 84%, rgba(138, 74, 41, 0.15), transparent 34%),
                linear-gradient(180deg, #0d0806 0%, #130d0a 45%, #090504 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Background Effects - Minimalista */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 179, 111, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 120, 86, 0.06) 0%, transparent 50%);
            animation: patternFloat 30s ease-in-out infinite;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 179, 111, 0.12) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: glowPulse 20s ease-in-out infinite;
            z-index: 0;
            border-radius: 50%;
        }

        @keyframes patternFloat {
            0%, 100% { 
                opacity: 1;
                transform: translateY(0);
            }
            50% { 
                opacity: 0.7;
                transform: translateY(-20px);
            }
        }

        @keyframes glowPulse {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.8;
            }
        }

        .login-container {
            background: linear-gradient(180deg, rgba(40, 28, 22, 0.94), rgba(18, 12, 10, 0.94));
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 4rem 3rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45), 0 0 40px rgba(255, 179, 111, 0.16);
            text-align: center;
            position: relative;
            z-index: 1;
            animation: containerFadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes containerFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo-container {
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
        }

        .logo-icon {
            width: 72px;
            height: 72px;
            color: var(--saber-blue);
            filter: drop-shadow(0 0 16px rgba(255, 179, 111, 0.42));
            animation: iconGlow 3s ease-in-out infinite;
            transition: all 0.3s ease;
        }

        .logo-container:hover .logo-icon {
            color: var(--saber-gold);
            filter: drop-shadow(0 0 20px rgba(255, 213, 155, 0.6));
        }

        @keyframes iconGlow {
            0%, 100% { 
                filter: drop-shadow(0 0 16px rgba(255, 179, 111, 0.42));
            }
            50% { 
                filter: drop-shadow(0 0 24px rgba(255, 179, 111, 0.64)) drop-shadow(0 0 32px rgba(255, 120, 86, 0.34));
            }
        }

        h1 {
            font-family: 'Cormorant Garamond', 'Sora', serif;
            background: linear-gradient(135deg, var(--saber-blue-light), var(--saber-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.75rem;
            font-size: 2.25rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            line-height: 1.6;
            font-size: 1rem;
        }

        .login-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: linear-gradient(135deg, var(--saber-blue), var(--saber-blue-dark));
            color: #1d120d;
            padding: 1.125rem 2.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
            width: 100%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(225, 114, 58, 0.24);
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .login-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(225, 114, 58, 0.32);
            background: linear-gradient(135deg, var(--saber-blue-light), var(--saber-blue));
        }

        .login-btn svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        .login-btn:hover svg {
            transform: scale(1.1);
        }

        .error {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.24);
            border-radius: 12px;
            padding: 1.125rem;
            margin-bottom: 1.5rem;
            color: #EF4444;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: errorSlide 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
        }

        @keyframes errorSlide {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .info {
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 1.125rem;
            margin-top: 2rem;
            color: var(--saber-gold);
            font-size: 0.9rem;
            line-height: 1.6;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            text-align: left;
        }

        .info svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            margin-top: 2px;
            color: var(--saber-gold);
        }

        .info strong {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--saber-gold-light);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 3rem 2rem;
            }

            h1 {
                font-size: 1.875rem;
            }

            .subtitle {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        </div>
        <h1>EyedBot Panel</h1>
        <p class="subtitle">Inicia sesión con tu cuenta de Discord para acceder al panel de administración</p>
        
        <div id="errorMessage" class="error" style="display: none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span></span>
        </div>
        
        <a href="/auth/discord" class="login-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                <polyline points="15 3 21 3 21 9"></polyline>
                <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
            <span>Iniciar Sesión con Discord</span>
        </a>

        <div class="info">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="16" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
            <div>
                <strong>Nota Importante</strong>
                Necesitas tener permisos de administrador en al menos un servidor donde el bot esté presente.
            </div>
        </div>
    </div>

    <script>
        // Mostrar mensajes de error si hay alguno en la URL
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        const errorMessages = {
            'no_code': 'No se recibió código de autorización. Intenta de nuevo.',
            'auth_failed': 'Error al autenticar. Verifica tu configuración de OAuth2.',
            'discord_error': 'Discord rechazó la autorización. Intenta de nuevo.',
            'session_error': 'Error al guardar la sesión. Intenta de nuevo.',
            'config_error': 'CLIENT_SECRET no está configurado. Verifica tu archivo .env',
            'invalid_secret': 'CLIENT_SECRET incorrecto. Verifica que coincida con Discord Developer Portal.'
        };

        if (error && errorMessages[error]) {
            const errorDiv = document.getElementById('errorMessage');
            const errorSpan = errorDiv.querySelector('span');
            errorSpan.textContent = errorMessages[error];
            errorDiv.style.display = 'flex';
        }
    </script>
</body>
</html>
